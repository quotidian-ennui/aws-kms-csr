name: check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: setup-java
        uses: quotidian-ennui/actions-olio/setup-java-gradle@448a2329caa783bbfe2ad58fc2123f7e05efae89 # v0.10.3
        with:
          java-version: "21"
          distribution: "temurin"
          writeable: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      - name: Build with Gradle
        run: |
          ./gradlew check

  changed_files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      workflow_files: ${{ steps.changes.outputs.workflows_any_changed == 'true' }}
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Changed Files
        id: changes
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files_yaml: |
            workflows:
              - ".github/workflows/**"

  merge_actions:
    needs:
      - build
      - changed_files
    if: |
      needs.changed_files.outputs.workflow_files == 'true' && github.actor == 'dependabot[bot]'
    uses: quotidian-ennui/workflows-olio/.github/workflows/action-dependabot-merge.yml@main
    with:
      app_id: ${{ vars.WORKFLOW_UPDATE_APP_ID }}
    secrets:
      app_private_key: ${{ secrets.WORKFLOW_UPDATE_KEY }}

  merge_java:
    needs:
      - build
      - changed_files
    if: |
      needs.changed_files.outputs.workflow_files == 'false' && github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Find associated PR
        uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # v1.3.5
        id: findpr
        with:
          github-token: ${{ github.token }}
          state: open
          sha: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}
      - name: merge-if-built
        continue-on-error: true
        uses: fastify/github-action-merge-dependabot@30c3f8f14a4f7b315ba38dbc1b793d27128fef82 # v3.12.0
        with:
          pr-number: ${{ steps.findpr.outputs.pr }}
          target: minor
