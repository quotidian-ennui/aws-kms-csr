name: dismiss-dependabot-alerts
on:
  workflow_dispatch:
  schedule:
    - cron: "15 06 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/dismiss-alerts.yml"
      - ".github/workflows/dismiss-dependabot-alerts.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}
jobs:
  dismiss-alerts:
    name: dismiss-alerts
    runs-on: ubuntu-latest
    steps:
      - name: "Create Token"
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.WORKFLOW_UPDATE_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_UPDATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name}}
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: "Dismiss alerts"
        id: dismiss-alerts
        uses: quotidian-ennui/actions-olio/dismiss-dependabot-alerts@448a2329caa783bbfe2ad58fc2123f7e05efae89 # v0.10.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          dismissal_file: .github/dismiss-alerts.yml
