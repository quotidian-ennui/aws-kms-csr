name: dismiss-dependabot-alerts
on:
  workflow_dispatch:
  schedule:
    - cron: "15 06 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/dismiss-alerts.yml"
      - ".github/workflows/dismiss-dependabot-alerts.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}
jobs:
  dismiss-alerts:
    name: dismiss-alerts
    runs-on: ubuntu-latest
    steps:
      - name: "Create Token"
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.WORKFLOW_UPDATE_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_UPDATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name}}
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: "Dismiss alerts"
        id: dismiss-alerts
        uses: quotidian-ennui/actions-olio/dismiss-dependabot-alerts@20d61b495f9f57f9103dd8f052d5808370d5ce8b # v1.2.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          dismissal_file: .github/dismiss-alerts.yml
